server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location /api/ {
        proxy_pass http://api:9000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        return 301 $scheme://$http_host/;
    }

    location ~* "^/(главная%20страница|главная\ страница)/index\.html$" {
        return 301 $scheme://$http_host/;
    }

    location ~* "^/каталог/index\.html$" {
        return 301 $scheme://$http_host/catalog/$is_args$args;
    }

    location ~* "^/cart/index\.html$" {
        return 301 $scheme://$http_host/cart/$is_args$args;
    }

    location ~* "^/auth/index\.html$" {
        return 301 $scheme://$http_host/auth/$is_args$args;
    }

    location ~* "^/account/index\.html$" {
        return 301 $scheme://$http_host/account/$is_args$args;
    }

    location ~* "^/admin/index\.html$" {
        return 301 $scheme://$http_host/admin/$is_args$args;
    }

    location ~* "^/(страница%20товара|страница\ товара)/index\.html$" {
        return 301 $scheme://$http_host/product/$is_args$args;
    }

    location ~* "^/товар/index\.html$" {
        return 301 $scheme://$http_host/product-alt/$is_args$args;
    }

    location = /catalog {
        return 301 $scheme://$http_host/catalog/$is_args$args;
    }

    location = /catalog/ {
        try_files /catalog/index.html =404;
    }

    location = /new {
        return 301 $scheme://$http_host/new/$is_args$args;
    }

    location ~* "^/new/index\.html$" {
        return 301 $scheme://$http_host/new/$is_args$args;
    }

    location = /new/ {
        try_files /new/index.html =404;
    }

    location = /hit {
        return 301 $scheme://$http_host/hit/$is_args$args;
    }

    location ~* "^/hit/index\.html$" {
        return 301 $scheme://$http_host/hit/$is_args$args;
    }

    location = /hit/ {
        try_files /hit/index.html =404;
    }

    location = /cart {
        return 301 $scheme://$http_host/cart/$is_args$args;
    }

    location = /cart/ {
        try_files /cart/index.html =404;
    }

    location = /auth {
        return 301 $scheme://$http_host/auth/$is_args$args;
    }

    location = /auth/ {
        try_files /auth/index.html =404;
    }

    location = /account {
        return 301 $scheme://$http_host/account/$is_args$args;
    }

    location = /account/ {
        try_files /account/index.html =404;
    }

    location = /admin {
        return 301 $scheme://$http_host/admin/$is_args$args;
    }

    location = /admin/ {
        try_files /admin/index.html =404;
    }

    location = /product {
        return 301 $scheme://$http_host/product/$is_args$args;
    }

    location = /product/ {
        try_files /product/index.html =404;
    }

    location = /product-alt {
        return 301 $scheme://$http_host/product-alt/$is_args$args;
    }

    location = /product-alt/ {
        try_files /product-alt/index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
