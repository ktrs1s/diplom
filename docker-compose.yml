name: exclusive-site

services:
  postgres:
    image: postgres:16-alpine
    container_name: exclusive-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-exclusive}
      POSTGRES_USER: ${POSTGRES_USER:-exclusive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exclusive}
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exclusive} -d ${POSTGRES_DB:-exclusive}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exclusive-site
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./фото:/usr/share/nginx/html/фото
      - ./uploads:/usr/share/nginx/html/uploads

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: exclusive-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://exclusive:exclusive@postgres:5432/exclusive}
      EXCLUSIVE_API_HOST: 0.0.0.0
      EXCLUSIVE_API_PORT: 9000
      EXCLUSIVE_DEMO_PHONE: ${EXCLUSIVE_DEMO_PHONE:-+79999999999}
      EXCLUSIVE_ADMIN_PHONES: ${EXCLUSIVE_ADMIN_PHONES:-+79953980243}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-exclusive_order_bot}
      TELEGRAM_MANAGER_CHAT_IDS: ${TELEGRAM_MANAGER_CHAT_IDS:-}
      TELEGRAM_MANAGER_USERNAMES: ${TELEGRAM_MANAGER_USERNAMES:-}
    ports:
      - "9000:9000"
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/backend/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/api/catalog', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
